<!DOCTYPE html>

        <div class="product-info">
          <h3>Farm Eggs</h3>
          <p class="price">₹90 / dozen</p>
          <button onclick="addToCart('Farm Eggs', 90)">Add to Cart</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1615485290382-441e4d049cb5?q=80&w=1200&auto=format&fit=crop" alt="Bananas">

        <div class="product-info">
          <h3>Bananas</h3>
          <p class="price">₹50 / dozen</p>
          <button onclick="addToCart('Bananas', 50)">Add to Cart</button>
        </div>
      </div>

    </div>
  </section>

  <section class="cart-section" id="cart">
    <h2>Shopping Cart</h2>

    <div id="cart-items"></div>

    <p class="total">Total: ₹<span id="total">0</span></p>
  </section>

  <footer id="footer">
    <p>© 2026 FreshMart Grocery Store</p>
    <p>Email: support@freshmart.com</p>
  </footer>

  <script>
    let cart = [];
    let total = 0;

    function addToCart(product, price) {
      cart.push({ product, price });
      total += price;

      updateCart();
    }

    function updateCart() {
      const cartItems = document.getElementById('cart-items');
      const totalElement = document.getElementById('total');

      cartItems.innerHTML = '';

      cart.forEach(item => {
        const div = document.createElement('div');
        div.classList.add('cart-item');

        div.innerHTML = `
          <span>${item.product}</span>
          <span>₹${item.price}</span>
        `;

        cartItems.appendChild(div);
      });

      totalElement.textContent = total;
    }

    function scrollToProducts() {
      document.getElementById('products').scrollIntoView({
        behavior: 'smooth'
      });
    }
  </script>

</body>
</html>
